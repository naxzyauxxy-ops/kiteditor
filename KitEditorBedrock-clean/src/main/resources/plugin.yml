name: KitEditorBedrock
version: '1.0'
main: dev.kiteditor.KitEditorBedrock
api-version: '1.21'
author: Claude
description: Lets Bedrock players open the KitMaster kit editor via command

commands:
  kiteditor:
    description: Opens the kit editor for a specific kit slot
    usage: /kiteditor <1-9>
  kitselector:
    description: Gives the kit selector item
    usage: /kitselector
